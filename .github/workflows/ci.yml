name: MiCodex CI Pipeline

# main veya develop'a push / PR olduğunda çalışır
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # 1. Backend (.NET) derleme kontrolü
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./discord-backend
    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4

      - name: .NET 10 Kurulumu
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Bağımlılıkları Yükle (Restore)
        run: dotnet restore DiscordClone.sln

      - name: Projeyi Derle (Build)
        run: dotnet build DiscordClone.sln --no-restore --configuration Release

  # 2. Frontend (Next.js) derleme kontrolü
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./discord-frontend
    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: discord-frontend/package-lock.json

      - name: Paketleri Yükle (npm ci)
        run: npm ci

      - name: Projeyi Derle (Build)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
